{% extends "base.html" %}

{% block title %}Jenga Connect - Register{% endblock %}

{% block content %}
<div class="container animate-fade-in" style="display: flex; justify-content: center; padding: 4rem 0;">
    <div
        style="background: var(--card-bg); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 100%; max-width: 500px; border: 1px solid var(--border-color);">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary); font-weight: 800;">Register Account
        </h2>

        {% if error %}
        <div
            style="background: #ffebee; color: #c62828; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1rem; text-align: center; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <label
                    style="flex: 1; text-align: center; padding: 1rem; border: 2px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
                    <input type="radio" name="role" value="fundi" checked style="display: none;"
                        onchange="toggleStoreField()">
                    <div style="font-weight: 600;">Fundi / Buyer</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">I want to order materials</div>
                </label>
                <label
                    style="flex: 1; text-align: center; padding: 1rem; border: 2px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
                    <input type="radio" name="role" value="hardware" style="display: none;"
                        onchange="toggleStoreField()">
                    <div style="font-weight: 600;">Hardware Store</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">I want to sell materials</div>
                </label>
            </div>

            <style>
                input[type="radio"]:checked+div {
                    color: var(--primary);
                }

                input[type="radio"]:checked~div {
                    color: var(--primary);
                }

                label:has(input[type="radio"]:checked) {
                    border-color: var(--primary) !important;
                    background: #fff8f5;
                }
            </style>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Full Name (or
                    Owner Name)</label>
                <input type="text" name="full_name" required placeholder="John Doe"
                    style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none;">
            </div>

            <div id="store-name-group" style="margin-bottom: 1rem; display: none;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Hardware
                    Store Name</label>
                <input type="text" name="store_name" placeholder="John Hardware & Tools"
                    style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none;">
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Phone
                        Number</label>
                    <input type="text" name="phone" required placeholder="07XXXXXXXX"
                        style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Location
                        Area</label>
                    <input type="text" name="area" required placeholder="Arusha CBD"
                        style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none;">
                </div>
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Create
                    Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                    style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none;">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 0.75rem; font-size: 1.1rem;">Register Now</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function toggleStoreField() {
        const isHardware = document.querySelector('input[name="role"]:checked').value === 'hardware';
        const storeGroup = document.getElementById('store-name-group');
        const storeInput = storeGroup.querySelector('input');

        if (isHardware) {
            storeGroup.style.display = 'block';
            storeInput.required = true;
        } else {
            storeGroup.style.display = 'none';
            storeInput.required = false;
        }
    }
</script>
{% endblock %}
