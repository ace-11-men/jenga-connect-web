services:
  - type: web
    name: jenga-connect-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health/
    autoDeploy: true

databases:
  - name: jenga_connect_db
    plan: free
    databaseName: jenga_connect
    user: jenga_connect
